name: bioodonto
description: App odontológico BioOdonto
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # Auth social — travado em <7.0.0 por incompatibilidade com Firebase Auth
  google_sign_in: '>=6.2.1 <7.0.0'
  sign_in_with_apple: ^6.1.0

  # Estado
  flutter_riverpod: ^2.6.1

  # Navegação
  go_router: ^14.6.1

  # UI
  pinput: ^5.0.0
  intl: ^0.19.0

  # Utils
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  mask_text_input_formatter: ^2.9.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: 'assets/icons/icon.png'
